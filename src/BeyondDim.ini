Default=50
Minimum=0

[Input]
Mode=Left-hand_Device

[Hotkey]
Increase=F16
Decrease=F17
Reset=F18

KeyboardIncrease=^!Up
KeyboardDecrease=^!Down
KeyboardReset=^!Home

[Status]
ShowStatus=1
StatusDuration=800
